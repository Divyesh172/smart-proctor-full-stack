version: '3.8'

services:
  # -----------------------------------------------------------------
  # 1. DATABASE (PostgreSQL 17)
  # -----------------------------------------------------------------
  db:
    image: postgres:17
    container_name: verifai-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # SECURITY FIX: Ports removed. Database is now only accessible
    # internally by the backend, not from the public internet.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - verifai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # 2. BACKEND (Python FastAPI)
  # -----------------------------------------------------------------
  backend:
    build: ./smart-proctor-backend
    container_name: verifai-backend
    # OPTIMIZATION: Run with production settings (no reload)
    command: bash start.sh
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PROJECT_NAME=VerifAI Enterprise
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - SECRET_KEY=${SECRET_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      # Allow frontend domain
      - BACKEND_CORS_ORIGINS=["https://${DOMAIN}", "http://localhost:3000"]
      - GO_BOUNCER_URL=http://bouncer:8080
    ports:
      - "8000:8000"
    networks:
      - verifai-net

  # -----------------------------------------------------------------
  # 3. BOUNCER (Go WebSocket Service)
  # -----------------------------------------------------------------
  bouncer:
    build: ./smart-proctor-bouncer
    container_name: verifai-bouncer
    restart: always
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - PORT=8080
      - BACKEND_URL=http://backend:8000
      - ALLOWED_ORIGINS=https://${DOMAIN},http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - verifai-net

volumes:
  postgres_data:

networks:
  verifai-net:
    driver: bridge